receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: debug

  # Dev: exporta para Floci (CloudWatch + X-Ray)
  awscloudwatchlogs:
    region: us-east-1
    endpoint: http://floci:4566
    log_group_name: /safehire/dev
    log_stream_name: otel-collector

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: safehire

  # Tracing para Tempo (VPS) ou X-Ray (Floci/AWS)
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp, logging]
