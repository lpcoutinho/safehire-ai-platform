name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: vps
        type: choice
        options:
          - vps
          - aws

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy to VPS
        if: ${{ github.event.inputs.environment == 'vps' }}
        run: |
          echo "Deploying full stack to VPS..."
          echo "ssh ${{ secrets.VPS_HOST }} 'docker compose -f docker-compose.vps.yml pull && docker compose -f docker-compose.vps.yml up -d'"

      - name: Deploy to AWS
        if: ${{ github.event.inputs.environment == 'aws' }}
        run: |
          echo "Deploying full stack to AWS ECS..."
          echo "aws ecs update-service --cluster safehire --services auth-service,api-gateway,core-management-api --force-new-deployment"
