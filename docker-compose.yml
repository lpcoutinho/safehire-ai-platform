version: '3.8'

services:
  # ============================================
  # INFRAESTRUTURA
  # ============================================

  postgres:
    image: postgres:15-alpine
    container_name: safehire-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safehire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safehire_password}
      POSTGRES_DB: ${POSTGRES_DB:-safehire}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safehire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safehire-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: safehire-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safehire-network

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: safehire-valkey
    command: valkey-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - safehire-network

  floci:
    image: ghcr.io/openstack/floci:latest
    container_name: safehire-floci
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: ${DEBUG:-0}
      DATA_DIR: /tmp/localstack_data
    volumes:
      - floci_data:/tmp/localstack_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safehire-network

  # ============================================
  # SERVIÇOS PYTHON
  # ============================================

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: safehire-auth-service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-safehire}:${POSTGRES_PASSWORD:-safehire_password}@postgres:5432/safehire
      AUTH_SCHEMA: auth_schema
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-me}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: ${DEBUG:-0}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: safehire-api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      CORE_SERVICE_URL: http://core-management-api:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-me}
      JWT_ALGORITHM: HS256
      VALKEY_URL: redis://valkey:6379/0
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 60
      DEBUG: ${DEBUG:-0}
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - core-management-api
      - valkey
    networks:
      - safehire-network
    restart: unless-stopped

  core-management-api:
    build:
      context: ./core-management-api
      dockerfile: Dockerfile
    container_name: safehire-core-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-safehire}:${POSTGRES_PASSWORD:-safehire_password}@postgres:5432/safehire
      CORE_SCHEMA: core_schema
      AWS_ACCESS_KEY_ID: fake_access_key
      AWS_SECRET_ACCESS_KEY: fake_secret_key
      AWS_REGION: us-east-1
      S3_ENDPOINT_URL: http://floci:4566
      S3_BUCKET_NAME: safehire-curriculos
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      RABBITMQ_QUEUE: candidatos.novos
      VALKEY_URL: redis://valkey:6379/1
      DEBUG: ${DEBUG:-0}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      floci:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  agent-worker-service:
    build:
      context: ./agent-worker-service
      dockerfile: Dockerfile
    container_name: safehire-agent-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-safehire}:${POSTGRES_PASSWORD:-safehire_password}@postgres:5432/safehire
      AGENT_SCHEMA: agent_schema
      AWS_ACCESS_KEY_ID: fake_access_key
      AWS_SECRET_ACCESS_KEY: fake_secret_key
      AWS_REGION: us-east-1
      S3_ENDPOINT_URL: http://floci:4566
      S3_BUCKET_NAME: safehire-curriculos
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      RABBITMQ_QUEUE: candidatos.novos
      VALKEY_URL: redis://valkey:6379/2
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: 384
      LLM_MODEL: gpt-4
      LLM_API_KEY: ${OPENAI_API_KEY:-}
      MAX_CONCURRENT_JOBS: 3
      JOB_TIMEOUT: 600
      DEBUG: ${DEBUG:-0}
    depends_on:
      postgres:
        condition: service_healthy
      floci:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  # ============================================
  # FRONTEND
  # ============================================

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: safehire-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:8000
      NEXT_PUBLIC_APP_NAME: SafeHire AI
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - safehire-network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  valkey_data:
  floci_data:

networks:
  safehire-network:
    driver: bridge
    internal: true