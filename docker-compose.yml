# ============================================
# docker-compose.yml  —  Desenvolvimento Local (Floci)
# Uso: docker compose up --build
# Stack: Floci (emulador AWS) + todos os serviços
# ============================================
services:

  # ============================================
  # INFRAESTRUTURA (Floci - All-in-One)
  # ============================================
  floci:
    image: floci/floci:latest
    container_name: safehire-floci
    ports:
      - "4566:4566"        # Edge: S3, SQS, DynamoDB, IAM, ECS, CloudWatch, X-Ray
      - "5433:5432"        # RDS PostgreSQL
      - "6380:6379"        # ElastiCache Valkey
      # - "9326:9324"      # SQS raw (redundante, acessível via 4566)
      # - "9327:9325"      # SQS UI (descomentar pra debug)
      # - "8089:8080"      # S3 UI (descomentar pra debug)
    environment:
      SERVICES: sqs,s3,rds,elasticache,cloudwatch,logs,xray,dynamodb
      DEBUG: ${DEBUG:-1}
      DATA_DIR: /tmp/localstack_data
      RDS_DEFAULT_ENGINE: postgres
      RDS_DEFAULT_ENGINE_VERSION: "15"
    volumes:
      - floci_data:/tmp/localstack_data
      - ./scripts/init-rds.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - safehire-network
    restart: unless-stopped

  # ============================================
  # OPENTELEMETRY COLLECTOR
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: safehire-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    depends_on:
      floci:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  # ============================================
  # SERVIÇOS PYTHON
  # ============================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: safehire-auth-service
    environment:
      DATABASE_URL: postgresql+asyncpg://safehire:safehire_password@floci:5432/safehire?sslmode=disable
      AUTH_SCHEMA: auth_schema
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-me}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: ${DEBUG:-1}
      AWS_ACCESS_KEY_ID: test_access_key
      AWS_SECRET_ACCESS_KEY: test_secret_key
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: us-east-1
      OBSERVABILITY_STACK: floci
      ENV: development
    ports:
      - "8001:8000"
    depends_on:
      floci:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: safehire-api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      CORE_SERVICE_URL: http://core-management-api:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-me}
      JWT_ALGORITHM: HS256
      VALKEY_URL: redis://floci:6379/0
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 60
      DEBUG: ${DEBUG:-1}
      OBSERVABILITY_STACK: floci
      ENV: development
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - core-management-api
    networks:
      - safehire-network
    restart: unless-stopped

  core-management-api:
    build:
      context: ./core-management-api
      dockerfile: Dockerfile
    container_name: safehire-core-api
    environment:
      DATABASE_URL: postgresql+asyncpg://safehire:safehire_password@floci:5432/safehire?sslmode=disable
      CORE_SCHEMA: core_schema
      AWS_ACCESS_KEY_ID: test_access_key
      AWS_SECRET_ACCESS_KEY: test_secret_key
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: safehire-curriculos
      AWS_SQS_ENDPOINT_URL: http://floci:4566
      SQS_QUEUE_NAME: candidatos.novos
      VALKEY_URL: redis://floci:6379/1
      DEBUG: ${DEBUG:-1}
      OBSERVABILITY_STACK: floci
      ENV: development
    ports:
      - "8002:8000"
    depends_on:
      floci:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  # Worker — consome SQS, não expõe porta HTTP
  agent-worker-service:
    build:
      context: ./agent-worker-service
      dockerfile: Dockerfile
    container_name: safehire-agent-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://safehire:safehire_password@floci:5432/safehire?sslmode=disable
      AGENT_SCHEMA: agent_schema
      AWS_ACCESS_KEY_ID: test_access_key
      AWS_SECRET_ACCESS_KEY: test_secret_key
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: safehire-curriculos
      AWS_SQS_ENDPOINT_URL: http://floci:4566
      SQS_QUEUE_NAME: candidatos.novos
      VALKEY_URL: redis://floci:6379/2
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: 384
      LLM_MODEL: gpt-4
      LLM_API_KEY: ${OPENAI_API_KEY:-}
      MAX_CONCURRENT_JOBS: 3
      JOB_TIMEOUT: 600
      DEBUG: ${DEBUG:-1}
      OBSERVABILITY_STACK: floci
      ENV: development
    depends_on:
      floci:
        condition: service_healthy
    networks:
      - safehire-network
    restart: unless-stopped

  # ============================================
  # FRONTEND
  # ============================================
  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: safehire-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:8000
      NEXT_PUBLIC_APP_NAME: SafeHire AI
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - safehire-network
    restart: unless-stopped

# ============================================
# VOLUMES E REDES GLOBAIS
# ============================================
volumes:
  floci_data: {}

networks:
  safehire-network:
    driver: bridge
    internal: false
